name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm install

    - name: Run tests
      run: npm test

    - name: SonarQube scan
      uses: sonarsource/sonarcloud-github-action@v2
      with:
        projectKey: "lucaslv96_TFG"
        organization: "lucaslv96"
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}